name: Build and Deploy

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    env:
      IMAGE_PLATFORMS: linux/arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_PAT != '' && secrets.REPO_PAT || github.token }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - run: chmod +x ./gradlew && ./gradlew build -x test

      - name: Resolve boot jar
        id: artifact
        run: |
          jar=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -n 1)
          [[ -z "$jar" ]] && { echo "Boot jar not found" >&2; exit 1; }
          echo "jar_file=$jar" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=false
          tags: |
            type=sha,prefix=prod-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=dev-,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_PAT }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          build-args: |
            JAR_FILE=${{ steps.artifact.outputs.jar_file }}
            SPRING_PROFILE=${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

    steps:
      - uses: actions/checkout@v4

      - uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_OCID }}

      - name: Deploy
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ needs.docker.outputs.image_tag }}
        run: |
          set -euo pipefail
          
          MANIFEST=$(ls deploy/${{ env.ENV }}/ | grep -i deployment | head -n 1)
          [[ -z "$MANIFEST" ]] && { echo "Deployment manifest not found" >&2; exit 1; }
          
          kubectl apply -f deploy/${{ env.ENV }}/
          kubectl set image -f deploy/${{ env.ENV }}/$MANIFEST api-gw=$IMAGE
          kubectl rollout status -f deploy/${{ env.ENV }}/$MANIFEST -n pluto --timeout=180s