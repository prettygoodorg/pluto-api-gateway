name: Build and Publish Docker Image

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_PLATFORMS: linux/arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_PAT != '' && secrets.REPO_PAT || github.token }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build application
        run: ./gradlew build -x test

      - name: Resolve boot jar
        id: artifact
        shell: bash
        run: |
          set -euo pipefail

          jar_file="$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -n 1)"

          if [[ -z "${jar_file}" ]]; then
            echo "Boot jar not found in build/libs" >&2
            exit 1
          fi

          echo "jar_file=${jar_file}" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix=prod-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=dev-,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          build-args: |
            JAR_FILE=${{ steps.artifact.outputs.jar_file }}
            SPRING_PROFILE=${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to OKE
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    env:
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure Kubectl for OKE
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          user_ocid: ${{ secrets.OCI_USER_OCID }}
          tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          region: ${{ secrets.OCI_REGION }}
          cluster_id: ${{ secrets.OKE_CLUSTER_ID }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deploy/${{ env.ENV }}/
          
          # Deployment name logic to handle differences between envs
          if [ "${{ env.ENV }}" == "prod" ]; then
            DEPLOYMENT_NAME="api-gw-deployment"
          else
            DEPLOYMENT_NAME="dev-api-gw-deployment"
          fi
          
          kubectl rollout restart deployment/${DEPLOYMENT_NAME} -n pluto
